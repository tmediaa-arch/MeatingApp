version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: mms-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - mms
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:1.27-alpine
    container_name: mms-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - mms
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: mms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-mms}
      POSTGRES_USER: ${DB_USERNAME:-mms}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret_password_change_me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - mms

  redis:
    image: redis:7-alpine
    container_name: mms-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - mms

  mailpit:
    image: axllent/mailpit:latest
    container_name: mms-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - mms

  # Queue worker — برای پردازش jobs در پس‌زمینه
  queue:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: mms-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --tries=3 --timeout=120
    volumes:
      - .:/var/www/html
    networks:
      - mms
    depends_on:
      - app
      - redis
      - postgres

  # Scheduler — برای فرایندهای زمان‌بندی شده
  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: mms-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: >
      sh -c "while true; do
        php artisan schedule:run --verbose --no-interaction;
        sleep 60;
      done"
    volumes:
      - .:/var/www/html
    networks:
      - mms
    depends_on:
      - app

volumes:
  postgres-data:
  redis-data:

networks:
  mms:
    driver: bridge
